<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AniStream Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        body { background-color: #05050a; color: white; font-family: sans-serif; }
    </style>
</head>
<body>
    <header class="p-4 flex justify-between items-center bg-black/80 sticky top-0 z-40 border-b border-purple-900">
        <h1 class="text-xl font-black italic">Ani<span class="text-purple-500">Stream</span></h1>
        <input type="text" id="search" placeholder="Search anime..." class="bg-gray-900 p-2 rounded-lg text-sm w-40 border border-purple-800">
    </header>

    <div id="grid" class="grid grid-cols-2 gap-4 p-4"></div>

    <script>
        const grid = document.getElementById('grid');
        const search = document.getElementById('search');

        // This is the "Engine" that fetches real data
        async function fetchAnime(query) {
            grid.innerHTML = "<p class='text-purple-400'>Syncing nodes...</p>";
            try {
                const res = await fetch(`https://api.jikan.moe/v4/anime?q=${query}&sfw`);
                const data = await res.json();
                grid.innerHTML = "";
                
                data.data.forEach(a => {
                    const div = document.createElement('div');
                    div.className = "bg-[#09090f] p-2 rounded-xl border border-purple-900";
                    div.innerHTML = `
                        <img src="${a.images.jpg.image_url}" class="rounded-lg w-full h-48 object-cover">
                        <p class="text-xs mt-2 font-bold truncate">${a.title}</p>
                    `;
                    grid.appendChild(div);
                });
            } catch (err) {
                grid.innerHTML = "<p class='text-red-500'>Connection failed.</p>";
            }
        }

        // Trigger search on "Enter" key
        search.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') fetchAnime(e.target.value);
        });

        // Initial load
        fetchAnime("Naruto");
    </script>
</body>
</html>
