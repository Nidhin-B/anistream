<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AniStream</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-white p-10">
    <h1 class="text-3xl font-bold underline">If you see this, the page is loading!</h1>
    <button id="testBtn" class="mt-5 bg-purple-600 p-4 rounded">Click me to test JavaScript</button>

    <script>
        document.getElementById('testBtn').addEventListener('click', () => {
            alert('JavaScript is working perfectly!');
        });
    </script>
</body>
</html>
