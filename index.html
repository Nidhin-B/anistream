<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AniStream</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <div class="logo">AniStream</div>
        <button>Sign in</button>
    </nav>

    <div class="hero">
        <h1>Welcome to AniStream</h1>
        <p>Your hub for trending anime.</p>
        <button>PLAY NOW</button>
    </div>

    <div class="grid-container" id="anime-grid">
        </div>

    <script>
        fetch('https://api.jikan.moe/v4/top/anime?limit=10')
            .then(response => response.json())
            .then(data => {
                const grid = document.getElementById('anime-grid');
                data.data.forEach(anime => {
                    const card = document.createElement('div');
                    card.className = 'card';
                    card.innerHTML = `
                        <img src="${anime.images.jpg.image_url}" alt="${anime.title}" style="width:100%; border-radius:4px;">
                        <p style="font-size: 0.9rem; margin-top: 10px;">${anime.title}</p>
                    `;
                    grid.appendChild(card);
                });
            })
            .catch(err => console.error('Error fetching data:', err));
    </script>
</body>
</html>
