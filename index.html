<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AniStream Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #050505; color: #fff; }
        .glass { background: rgba(18, 18, 18, 0.9); backdrop-filter: blur(15px); }
        .hover-scale { transition: transform 0.2s; }
        .hover-scale:hover { transform: scale(1.03); }
    </style>
</head>
<body>

    <header class="glass sticky top-0 z-40 p-4 border-b border-white/10 flex justify-between items-center">
        <h1 class="text-2xl font-black italic tracking-tighter">ani<span class="text-purple-600">stream</span></h1>
        <input type="text" id="search" placeholder="Search anime..." class="bg-gray-900 border border-white/10 rounded-full px-5 py-2 text-sm w-40 outline-none focus:border-purple-500">
    </header>

    <main id="grid" class="p-4 grid grid-cols-2 md:grid-cols-4 gap-4"></main>

    <div id="drawer" class="hidden fixed inset-0 z-50 bg-[#050505] p-6 overflow-y-auto">
        <button onclick="document.getElementById('drawer').classList.add('hidden')" class="text-purple-400 font-bold mb-6">← BACK</button>
        <div class="md:flex gap-8">
            <img id="detailImg" class="w-full md:w-80 h-96 object-cover rounded-2xl">
            <div>
                <h2 id="detailTitle" class="text-4xl font-black mb-4"></h2>
                <p id="detailDesc" class="text-gray-400 mb-6"></p>
                <div id="epGrid" class="grid grid-cols-5 gap-2"></div>
            </div>
        </div>
    </div>

    <script>
        const grid = document.getElementById('grid');
        async function fetchAnime(q) {
            grid.innerHTML = "<p class='col-span-full text-center'>Syncing...</p>";
            const res = await fetch(`https://api.jikan.moe/v4/anime?q=${q}&sfw`);
            const data = await res.json();
            grid.innerHTML = "";
            data.data.forEach(a => {
                const div = document.createElement('div');
                div.className = "hover-scale bg-gray-900 rounded-xl overflow-hidden cursor-pointer border border-white/5";
                div.innerHTML = `<img src="${a.images.jpg.image_url}" class="w-full h-56 object-cover">
                                 <div class="p-3"><p class="text-xs font-bold truncate">${a.title}</p></div>`;
                div.onclick = () => showDetail(a);
                grid.appendChild(div);
            });
        }

        function showDetail(a) {
            document.getElementById('detailImg').src = a.images.jpg.image_url;
            document.getElementById('detailTitle').innerText = a.title;
            document.getElementById('detailDesc').innerText = a.synopsis ? a.synopsis.substring(0, 200) + "..." : "No description.";
            const epGrid = document.getElementById('epGrid');
            epGrid.innerHTML = "";
            for(let i=1; i<=Math.min(a.episodes || 12, 25); i++) {
                const b = document.createElement('button');
                b.className = "bg-purple-900/50 p-2 rounded text-xs hover:bg-purple-600";
                b.innerText = i;
                b.onclick = () => alert("Now Playing: Episode " + i);
                epGrid.appendChild(b);
            }
            document.getElementById('drawer').classList.remove('hidden');
        }

        document.getElementById('search').onchange = (e) => fetchAnime(e.target.value);
        fetchAnime("Naruto");
    </script>
</body>
</html>
