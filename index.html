<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AniStream</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        /* This CSS recreates the "Anikoto" dark, modern interface */
        body { background-color: #0b0e14; color: #ffffff; font-family: 'Inter', sans-serif; }
        .nav-glass { background: rgba(18, 18, 20, 0.95); backdrop-filter: blur(10px); }
        .anime-card { transition: all 0.3s ease; }
        .anime-card:hover { transform: scale(1.05); border: 1px solid #6366f1; }
    </style>
</head>
<body>
    <nav class="nav-glass p-4 flex justify-between items-center sticky top-0 z-50 border-b border-gray-800">
        <h1 class="text-xl font-bold tracking-tighter">ani<span class="text-purple-500">stream</span></h1>
        <input type="text" id="search" class="bg-gray-800 rounded-full px-4 py-1 text-sm border border-gray-700" placeholder="Search...">
    </nav>

    <main id="grid" class="p-4 grid grid-cols-2 md:grid-cols-4 gap-4"></main>

    <script>
        const grid = document.getElementById('grid');
        async function fetchAnime(q) {
            const res = await fetch(`https://api.jikan.moe/v4/anime?q=${q}&sfw`);
            const data = await res.json();
            grid.innerHTML = "";
            data.data.forEach(a => {
                const div = document.createElement('div');
                div.className = "anime-card bg-gray-900 p-2 rounded-lg cursor-pointer";
                div.innerHTML = `<img src="${a.images.jpg.image_url}" class="w-full h-56 object-cover rounded-md">
                                 <p class="text-xs mt-2 font-semibold truncate">${a.title}</p>`;
                div.onclick = () => alert("Interactive features activated!");
                grid.appendChild(div);
            });
        }
        document.getElementById('search').onchange = (e) => fetchAnime(e.target.value);
        fetchAnime("Naruto");
    </script>
</body>
</html>
